<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Connect Four</title>

  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cell: 56px;
      --gap: 4px;
      --pad: 6px;
      --board-bg: #1a1a2e;
      --cell-bg: #0f3460;
      --cell-hover: #1a4a7a;
      --cell-border: #2d5986;
      --text-primary: #eaeaea;
      --text-muted: #8892a4;
      --accent: #e94560;
      --header-bg: #12122a;
      --btn-clear: #e94560;
      --btn-clear-hover: #c73652;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--board-bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Header ── */
    header {
      width: 100%;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      background: var(--header-bg);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    header h1 {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: 0.03em;
    }

    header h1 span { color: var(--accent); }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-muted);
      background: rgba(255,255,255,0.05);
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #2ecc71;
      flex-shrink: 0;
    }

    .status-dot.offline { background: #e74c3c; }

    .btn-clear {
      background: var(--btn-clear);
      color: #fff;
      border: none;
      border-radius: 7px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
    }

    .btn-clear:hover { background: var(--btn-clear-hover); }
    .btn-clear:active { transform: scale(0.97); }

    /* ── Main ── */
    .main {
      width: 100%;
      padding: 40px 24px 60px;
      display: flex;
      justify-content: center;
      overflow-x: auto;
    }

    /* ── Desktop: diagonal staircase ── */
    #board-desktop {
      position: relative;
    }

    /* ── Mobile: vertical stack ── */
    #board-mobile {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      width: 100%;
    }

    @media (max-width: 680px) {
      :root { --cell: 52px; }
      #board-desktop { display: none !important; }
      #board-mobile  { display: flex !important; }
      .main { padding: 28px 16px 60px; }
    }

    /* ── Layer grid ── */
    .layer {
      display: grid;
      grid-template-columns: repeat(5, var(--cell));
      grid-template-rows: repeat(5, var(--cell));
      gap: var(--gap);
      background: rgba(45, 89, 134, 0.18);
      border: 1px solid var(--cell-border);
      border-radius: 6px;
      padding: var(--pad);
    }

    .mobile-layer-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .layer-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
    }

    /* ── Cell ── */
    .cell {
      width: var(--cell);
      height: var(--cell);
      background: var(--cell-bg);
      border: 1px solid var(--cell-border);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
      transition: background 0.12s, border-color 0.12s, transform 0.1s;
      user-select: none;
      outline: none;
    }

    .cell:hover {
      background: var(--cell-hover);
      border-color: var(--accent);
      transform: scale(1.06);
      z-index: 10;
      position: relative;
    }

    .cell.has-letter {
      border-color: var(--accent);
    }

    .cell.editing {
      background: rgba(233, 69, 96, 0.2);
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent);
      position: relative;
      z-index: 10;
    }

    /* ── Keystroke capture input ──
       Must be physically off-screen (not opacity:0 or height:0) so
       iOS Safari treats it as a real focusable input and fires 'input'
       events from the virtual keyboard. top:-200px keeps it invisible
       while remaining in the accessibility tree.                       */
    #capture {
      position: fixed;
      top: -200px;
      left: 0;
      width: 100%;
      height: 40px;
      opacity: 0;
      border: none;
      padding: 0;
      margin: 0;
      font-size: 16px;   /* prevents iOS auto-zoom */
      background: transparent;
      color: transparent;
      caret-color: transparent;
      z-index: 0;
      pointer-events: none;
      -webkit-user-select: text;
      user-select: text;
    }

    /* ── Player setup bar ── */
    .player-bar {
      width: 100%;
      background: #0d0d22;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      padding: 10px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .player-bar label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .player-count-input {
      width: 52px;
      padding: 5px 8px;
      border-radius: 6px;
      border: 1px solid var(--cell-border);
      background: var(--cell-bg);
      color: var(--text-primary);
      font-size: 14px;
      font-weight: 600;
      text-align: center;
      outline: none;
      -moz-appearance: textfield;
    }
    .player-count-input::-webkit-outer-spin-button,
    .player-count-input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .player-count-input:focus { border-color: var(--accent); }

    .divider { width: 1px; height: 20px; background: rgba(255,255,255,0.1); }

    .next-up {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-left: auto;
    }

    .next-up-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    /* Turn indicator: shows the expected turn number + player slot */
    .next-up-info {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 2px;
    }

    .next-up-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: var(--accent);
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0;
      transition: background 0.2s;
      border: 2px solid rgba(255,255,255,0.15);
    }

    .next-up-badge.waiting {
      background: rgba(255,255,255,0.07);
      border-color: rgba(255,255,255,0.1);
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }

    /* Small "Turn N · Player M of K" line under the badge */
    .turn-meta {
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    @media (max-width: 480px) {
      .player-bar { padding: 10px 16px; gap: 12px; }
      .next-up { margin-left: 0; }
    }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.active { display: flex; }

    .modal {
      background: #1e1e38;
      border: 1px solid var(--cell-border);
      border-radius: 12px;
      padding: 28px 28px;
      width: 300px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .modal h3 { font-size: 17px; font-weight: 600; }
    .modal p  { font-size: 14px; color: var(--text-muted); line-height: 1.5; }
    .modal-btns { display: flex; gap: 10px; justify-content: flex-end; }

    .btn-secondary {
      background: rgba(255,255,255,0.07);
      color: var(--text-primary);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 7px;
      padding: 9px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.12); }

    .btn-modal-danger {
      background: var(--btn-clear);
      color: #fff;
      border: none;
      border-radius: 7px;
      padding: 9px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-modal-danger:hover { background: var(--btn-clear-hover); }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: #2d2d4e;
      color: var(--text-primary);
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      border: 1px solid rgba(255,255,255,0.1);
      transition: transform 0.25s ease;
      z-index: 200;
      pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<header>
  <h1>3D Connect <span>Four</span></h1>
  <div class="header-right">
    <div class="status-pill">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">Connecting…</span>
    </div>
    <button class="btn-clear" onclick="confirmClear()">✕ Clear board</button>
  </div>
</header>

<!-- Player setup bar -->
<div class="player-bar">
  <label for="player-count">Players</label>
  <input
    id="player-count"
    class="player-count-input"
    type="number"
    min="2"
    max="8"
    value="2"
    inputmode="numeric"
  />
  <div class="divider"></div>
  <div class="next-up">
    <span class="next-up-label">Next up</span>
    <div class="next-up-info">
      <div class="next-up-badge waiting" id="next-up-badge">—</div>
      <div class="turn-meta" id="turn-meta"></div>
    </div>
  </div>
</div>

<div class="main">
  <!-- Desktop: diagonal staircase -->
  <div id="board-desktop"></div>
  <!-- Mobile: vertical stack -->
  <div id="board-mobile"></div>
</div>

<!-- Confirm modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3>Clear the board?</h3>
    <p>This will erase all letters and play history for everyone. This cannot be undone.</p>
    <div class="modal-btns">
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-modal-danger" onclick="clearBoard()">Clear board</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<input id="capture" type="text" autocomplete="off" />

<script>
  /* ─────────────────────────────────────────────────────────────────
     Firebase setup
  ───────────────────────────────────────────────────────────────── */
  const firebaseConfig = {
    apiKey:            "AIzaSyBOrtrifGrTsc34UZ-QC1ilZ2H_pC7z6tw",
    authDomain:        "dconnect4-b6d31.firebaseapp.com",
    databaseURL:       "https://dconnect4-b6d31-default-rtdb.firebaseio.com",
    projectId:         "dconnect4-b6d31",
    storageBucket:     "dconnect4-b6d31.firebasestorage.app",
    messagingSenderId: "184984622657",
    appId:             "1:184984622657:web:5e462797533e01fd37d8c0",
    measurementId:     "G-QWDW21S5S7"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  // Three separate Firebase refs:
  //   board/      → { "l-r-c": "LETTER", ... }
  //   history/    → { "0": { key:"l-r-c", letter:"X" }, "1": ..., ... }
  //                 Ordered list of every play made (push order = turn order)
  //   meta/       → { playerCount: N }
  const boardRef   = db.ref('board');
  const historyRef = db.ref('history');
  const metaRef    = db.ref('meta');

  let boardData   = {};   // current cell contents
  let playHistory = [];   // ordered array of { key, letter } representing each play in sequence
  let playerCount = 2;    // synced from Firebase
  let selectedCell = null;

  /* ─────────────────────────────────────────────────────────────────
     Turn logic
     
     We track the *sequence* of plays via `history`. Each time a
     player types a letter that IS the correct letter for that turn
     slot, it gets appended to history. The number of entries in
     history tells us how many turns have been taken. The next turn
     index mod playerCount gives us which player slot is up.

     We can't know player letters in advance (they type their own
     initials), so we don't enforce who types what — but we DO track
     what was actually typed and in what order, so the "next up"
     display always reflects the correct sequential position.

     "Next up" display logic:
       turnsTaken = playHistory.length
       nextSlot   = turnsTaken % playerCount   (0-indexed)
       
     To show a helpful letter hint we look at the letters used in
     slot positions 0, playerCount, 2*playerCount, ... (i.e. every
     Nth entry) to see if that player has established a letter. If
     so, show it. Otherwise show the slot number (P1, P2, …).
  ───────────────────────────────────────────────────────────────── */

  /**
   * Derive the canonical letter for each player slot from history.
   *
   * Strategy: walk history in order. The first play goes to slot 0,
   * second to slot 1, ..., Nth to slot N-1, then wrap. The letter
   * seen at the FIRST occurrence of each slot is that player's letter.
   *
   * Returns an array of length playerCount where each entry is either
   * a letter string or null if that slot hasn't played yet.
   */
  function derivePlayerLetters() {
    const letters = new Array(playerCount).fill(null);
    for (let i = 0; i < playHistory.length; i++) {
      const s = i % playerCount;
      if (letters[s] === null) {
        letters[s] = playHistory[i].letter;
      }
    }
    return letters;
  }

  function updateNextUp() {
    const badge  = document.getElementById('next-up-badge');
    const meta   = document.getElementById('turn-meta');

    if (playerCount < 2) {
      badge.textContent = '—';
      badge.className   = 'next-up-badge waiting';
      meta.textContent  = '';
      return;
    }

    const turnsTaken   = playHistory.length;
    const nextSlot     = turnsTaken % playerCount;   // 0-indexed
    const turnNumber   = turnsTaken + 1;             // 1-based

    const playerLetters = derivePlayerLetters();
    const knownLetter   = playerLetters[nextSlot];

    // Show the letter if known; otherwise show "?" until that player
    // has made their first play (only happens before round 1 ends)
    badge.textContent = knownLetter || '?';
    badge.className   = 'next-up-badge';

    // Build a compact player-order hint, e.g. "A → L → Z → A → …"
    // Replace null slots with "?" for readability
    const allLetters = playerLetters.map(l => l || '?');
    // Highlight the current slot with brackets: A → [L] → Z
    allLetters[nextSlot] = `[${allLetters[nextSlot]}]`;
    meta.textContent = `Turn ${turnNumber}  ·  ${allLetters.join(' → ')}`;
  }

  /* ─────────────────────────────────────────────────────────────────
     Player count — stored in Firebase so all clients stay in sync
  ───────────────────────────────────────────────────────────────── */
  const playerCountInput = document.getElementById('player-count');

  // Listen for remote changes
  metaRef.child('playerCount').on('value', snap => {
    const val = snap.val();
    if (val !== null && val !== playerCount) {
      playerCount = val;
      playerCountInput.value = val;
      updateNextUp();
    }
  });

  // Push local changes to Firebase (debounced 400 ms so rapid typing
  // doesn't hammer the DB)
  let pcDebounce;
  playerCountInput.addEventListener('input', () => {
    const v = parseInt(playerCountInput.value);
    if (isNaN(v) || v < 2 || v > 8) return;
    playerCount = v;
    updateNextUp();
    clearTimeout(pcDebounce);
    pcDebounce = setTimeout(() => {
      metaRef.child('playerCount').set(v);
    }, 400);
  });

  /* ─────────────────────────────────────────────────────────────────
     Layout helpers
  ───────────────────────────────────────────────────────────────── */
  function cellPx() {
    return parseInt(getComputedStyle(document.documentElement).getPropertyValue('--cell')) || 56;
  }

  function layerPx() {
    const c = cellPx();
    return 5 * c + 4 * 4 + 2 * 6;
  }

  /* ─────────────────────────────────────────────────────────────────
     Board builders
  ───────────────────────────────────────────────────────────────── */
  function buildDesktop() {
    const wrap = document.getElementById('board-desktop');
    wrap.innerHTML = '';

    const ls   = layerPx();
    const gapH = 12;
    const stepX = ls + gapH;
    const stepY = Math.round(ls * 0.28);

    const totalW = ls + stepX * 4;
    const totalH = ls + stepY * 4 + 24;
    wrap.style.width  = totalW + 'px';
    wrap.style.height = totalH + 'px';

    for (let l = 0; l < 5; l++) {
      const layerWrap = document.createElement('div');
      layerWrap.style.cssText = `position:absolute; left:${stepX * l}px; top:${stepY * l + 20}px;`;

      const label = document.createElement('div');
      label.className = 'layer-label';
      label.style.cssText = 'position:absolute; top:-18px; left:0;';
      label.textContent = `Layer ${l + 1}`;
      layerWrap.appendChild(label);

      layerWrap.appendChild(buildGrid(l));
      wrap.appendChild(layerWrap);
    }
  }

  function buildMobile() {
    const wrap = document.getElementById('board-mobile');
    wrap.innerHTML = '';

    for (let l = 0; l < 5; l++) {
      const layerWrap = document.createElement('div');
      layerWrap.className = 'mobile-layer-wrap';

      const label = document.createElement('div');
      label.className = 'layer-label';
      label.textContent = `Layer ${l + 1}`;
      layerWrap.appendChild(label);

      layerWrap.appendChild(buildGrid(l));
      wrap.appendChild(layerWrap);
    }
  }

  function buildGrid(l) {
    const grid = document.createElement('div');
    grid.className = 'layer';

    for (let r = 0; r < 5; r++) {
      for (let c = 0; c < 5; c++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.dataset.l = l;
        cell.dataset.r = r;
        cell.dataset.c = c;
        cell.setAttribute('tabindex', '0');
        cell.setAttribute('aria-label', `Layer ${l+1} row ${r+1} col ${c+1}`);
        cell.addEventListener('click', () => selectCell(l, r, c));
        grid.appendChild(cell);
      }
    }
    return grid;
  }

  function buildAll() {
    buildDesktop();
    buildMobile();
    renderBoard();
  }

  /* ─────────────────────────────────────────────────────────────────
     Cell selection
  ───────────────────────────────────────────────────────────────── */
  function selectCell(l, r, c) {
    if (selectedCell) clearEditing(selectedCell);
    selectedCell = { layer: l, row: r, col: c };
    getCells(l, r, c).forEach(el => el.classList.add('editing'));

    const cap = document.getElementById('capture');
    cap.value = '';
    requestAnimationFrame(() => {
      cap.focus({ preventScroll: true });
    });
  }

  function deselectAll() {
    if (selectedCell) clearEditing(selectedCell);
    selectedCell = null;
  }

  function clearEditing({ layer, row, col }) {
    getCells(layer, row, col).forEach(el => el.classList.remove('editing'));
  }

  function getCells(l, r, c) {
    return document.querySelectorAll(`.cell[data-l="${l}"][data-r="${r}"][data-c="${c}"]`);
  }

  /* ─────────────────────────────────────────────────────────────────
     Key / input capture

     When a letter is typed into a cell we:
       1. Write it to board/l-r-c  (for display)
       2. Append to history/       (for turn tracking)

     If the cell already had a letter, we remove that letter's
     history entry (the most-recent one for that key) so we don't
     double-count a re-typed cell. Then we add the new one.

     Backspace/Delete removes the letter from board AND removes the
     most-recent history entry for that cell key.
  ───────────────────────────────────────────────────────────────── */
  const capture = document.getElementById('capture');

  function cellKey(l, r, c) { return `${l}-${r}-${c}`; }

  /**
   * Record a play: write letter to board, add to history.
   * If the cell already has a letter, remove its existing history
   * entry first so turn counts stay accurate.
   */
  function recordPlay(l, r, c, letter) {
    const key = cellKey(l, r, c);
    const hadLetter = !!boardData[key];

    // Build atomic multi-path update
    const updates = {};
    updates[`board/${key}`] = letter;

    if (hadLetter) {
      // Find and remove the most-recent history entry for this cell key
      removeHistoryEntry(key, () => {
        // After removal, push the new entry
        historyRef.push({ key, letter });
      });
      boardRef.child(key).set(letter);
    } else {
      boardRef.child(key).set(letter);
      historyRef.push({ key, letter });
    }
  }

  /**
   * Remove the most-recent history entry whose .key matches cellKey.
   * Calls callback when done.
   */
  function removeHistoryEntry(cellKey, callback) {
    historyRef.orderByChild('key').equalTo(cellKey).once('value', snap => {
      if (!snap.exists()) { callback && callback(); return; }
      // Get all matching entries, delete the last one (highest push key)
      const entries = [];
      snap.forEach(child => entries.push(child.ref));
      // Push keys are lexicographically ordered, last = most recent
      const lastRef = entries[entries.length - 1];
      lastRef.remove().then(callback);
    });
  }

  /**
   * Erase a cell: remove from board, remove all history entries for it.
   */
  function eraseCell(l, r, c) {
    const key = cellKey(l, r, c);
    if (!boardData[key]) return;  // already empty, nothing to do
    boardRef.child(key).remove();
    // Remove ALL history entries for this cell (handles edge cases)
    historyRef.orderByChild('key').equalTo(key).once('value', snap => {
      snap.forEach(child => child.ref.remove());
    });
  }

  // Desktop keydown
  capture.addEventListener('keydown', e => {
    if (!selectedCell) return;
    const { layer, row, col } = selectedCell;

    if (/^[a-zA-Z]$/.test(e.key)) {
      e.preventDefault();
      recordPlay(layer, row, col, e.key.toUpperCase());
      advanceSelection(layer, row, col);
    } else if (e.key === 'Backspace' || e.key === 'Delete') {
      e.preventDefault();
      eraseCell(layer, row, col);
    } else if (e.key === 'Escape') {
      deselectAll();
    } else if (e.key === 'Tab') {
      e.preventDefault();
      advanceSelection(layer, row, col);
    }
  });

  // Mobile virtual keyboard
  capture.addEventListener('input', () => {
    const val = capture.value;
    capture.value = '';
    if (!val || !selectedCell) return;
    const { layer, row, col } = selectedCell;
    const char = val.replace(/[^a-zA-Z]/g, '').slice(-1);
    if (char) {
      recordPlay(layer, row, col, char.toUpperCase());
      advanceSelection(layer, row, col);
    }
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('.cell') && e.target.id !== 'capture') deselectAll();
  });

  function advanceSelection(l, r, c) {
    let nc = c + 1, nr = r;
    if (nc >= 5) { nc = 0; nr++; }
    if (nr >= 5) { nr = 0; }
    selectCell(l, nr, nc);
  }

  /* ─────────────────────────────────────────────────────────────────
     Firebase listeners
  ───────────────────────────────────────────────────────────────── */

  // Board letters
  boardRef.on('value', snap => {
    boardData = snap.val() || {};
    renderBoard();
  });

  // Play history (ordered)
  historyRef.on('value', snap => {
    playHistory = [];
    if (snap.exists()) {
      snap.forEach(child => {
        playHistory.push(child.val());
      });
    }
    updateNextUp();
  });

  // Connection status
  db.ref('.info/connected').on('value', snap => {
    const online = snap.val() === true;
    document.getElementById('status-dot').classList.toggle('offline', !online);
    document.getElementById('status-text').textContent = online ? 'Live sync' : 'Offline';
  });

  function renderBoard() {
    for (let l = 0; l < 5; l++) {
      for (let r = 0; r < 5; r++) {
        for (let c = 0; c < 5; c++) {
          const letter = boardData[`${l}-${r}-${c}`] || '';
          getCells(l, r, c).forEach(el => {
            el.textContent = letter;
            el.classList.toggle('has-letter', !!letter);
            if (selectedCell && selectedCell.layer === l && selectedCell.row === r && selectedCell.col === c) {
              el.classList.add('editing');
            }
          });
        }
      }
    }
    updateNextUp();
  }

  /* ─────────────────────────────────────────────────────────────────
     Clear board
  ───────────────────────────────────────────────────────────────── */
  function confirmClear() {
    document.getElementById('modal-overlay').classList.add('active');
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('active');
  }

  function clearBoard() {
    closeModal();
    deselectAll();
    // Clear board and history; preserve playerCount in meta
    Promise.all([
      boardRef.remove(),
      historyRef.remove()
    ]).then(() => showToast('Board cleared'));
  }

  document.getElementById('modal-overlay').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
  });

  /* ─────────────────────────────────────────────────────────────────
     Toast
  ───────────────────────────────────────────────────────────────── */
  let toastTimer;
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
  }

  /* ─────────────────────────────────────────────────────────────────
     Init
  ───────────────────────────────────────────────────────────────── */
  buildAll();

  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(buildAll, 150);
  });
</script>

</body>
</html>
