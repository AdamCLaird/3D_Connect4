<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Connect Four</title>

  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cell: 56px;
      --gap: 4px;
      --pad: 6px;
      --board-bg: #1a1a2e;
      --cell-bg: #0f3460;
      --cell-hover: #1a4a7a;
      --cell-border: #2d5986;
      --text-primary: #eaeaea;
      --text-muted: #8892a4;
      --accent: #e94560;
      --sidebar-bg: #12122a;
      --btn-clear: #e94560;
      --btn-clear-hover: #c73652;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--board-bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Header ── */
    header {
      width: 100%;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      background: var(--sidebar-bg);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    header h1 span { color: var(--accent); }

    .header-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-muted);
      background: rgba(255,255,255,0.05);
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #2ecc71;
      flex-shrink: 0;
    }

    .status-dot.offline { background: #e74c3c; }

    .btn-clear {
      background: var(--btn-clear);
      color: #fff;
      border: none;
      border-radius: 7px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
    }

    .btn-clear:hover { background: var(--btn-clear-hover); }
    .btn-clear:active { transform: scale(0.97); }

    /* ── Main layout ── */
    .main {
      width: 100%;
      max-width: 900px;
      padding: 36px 24px 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* ── Desktop: diagonal staircase ── */
    .board-desktop {
      display: block;
      position: relative;
    }

    /* ── Mobile: vertical stack ── */
    .board-mobile {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      width: 100%;
    }

    @media (max-width: 680px) {
      :root { --cell: 54px; }
      .board-desktop { display: none; }
      .board-mobile { display: flex; }
    }

    /* ── Layer (shared styles) ── */
    .layer {
      display: grid;
      grid-template-columns: repeat(5, var(--cell));
      grid-template-rows: repeat(5, var(--cell));
      gap: var(--gap);
      background: rgba(45, 89, 134, 0.18);
      border: 1px solid var(--cell-border);
      border-radius: 6px;
      padding: var(--pad);
    }

    /* Desktop: absolutely positioned */
    .board-desktop .layer {
      position: absolute;
    }

    /* Mobile: normal flow, full label above */
    .mobile-layer-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      width: 100%;
    }

    .layer-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
    }

    /* Desktop label: absolute above each grid */
    .board-desktop .layer-label {
      position: absolute;
      top: -20px;
      left: 0;
    }

    /* ── Cell ── */
    .cell {
      width: var(--cell);
      height: var(--cell);
      background: var(--cell-bg);
      border: 1px solid var(--cell-border);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
      transition: background 0.12s, border-color 0.12s, transform 0.1s;
      user-select: none;
      outline: none;
      position: relative;
    }

    .cell:hover {
      background: var(--cell-hover);
      border-color: var(--accent);
      transform: scale(1.06);
      z-index: 10;
    }

    .cell.has-letter {
      background: #0f3460;
      border-color: var(--accent);
      color: #fff;
    }

    .cell.editing {
      background: rgba(233, 69, 96, 0.2);
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent);
    }

    /* ── Hidden keystroke capture ── */
    #capture {
      position: fixed;
      top: -9999px;
      left: -9999px;
      opacity: 0;
      pointer-events: none;
    }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.active { display: flex; }

    .modal {
      background: #1e1e38;
      border: 1px solid var(--cell-border);
      border-radius: 12px;
      padding: 28px 32px;
      width: 300px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .modal h3 { font-size: 17px; font-weight: 600; }

    .modal p { font-size: 14px; color: var(--text-muted); line-height: 1.5; }

    .modal-btns { display: flex; gap: 10px; justify-content: flex-end; }

    .btn-secondary {
      background: rgba(255,255,255,0.07);
      color: var(--text-primary);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 7px;
      padding: 9px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-secondary:hover { background: rgba(255,255,255,0.12); }

    .btn-modal-danger {
      background: var(--btn-clear);
      color: #fff;
      border: none;
      border-radius: 7px;
      padding: 9px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-modal-danger:hover { background: var(--btn-clear-hover); }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: #2d2d4e;
      color: var(--text-primary);
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      border: 1px solid rgba(255,255,255,0.1);
      transition: transform 0.25s ease;
      z-index: 200;
      pointer-events: none;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<header>
  <h1>3D Connect <span>Four</span></h1>
  <div class="header-right">
    <div class="status-pill">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">Connecting…</span>
    </div>
    <button class="btn-clear" onclick="confirmClear()">✕ Clear board</button>
  </div>
</header>

<div class="main">

  <!-- Desktop: diagonal staircase -->
  <div class="board-desktop" id="board-desktop"></div>

  <!-- Mobile: vertical stack -->
  <div class="board-mobile" id="board-mobile"></div>

</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3>Clear the board?</h3>
    <p>This will erase all letters for everyone. This cannot be undone.</p>
    <div class="modal-btns">
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-modal-danger" onclick="clearBoard()">Clear board</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<input id="capture" type="text" autocomplete="off" />

<script>
  // ── FIREBASE CONFIG ─────────────────────────────────────────────────────────
  const firebaseConfig = {
    apiKey:            "AIzaSyBOrtrifGrTsc34UZ-QC1ilZ2H_pC7z6tw",
    authDomain:        "dconnect4-b6d31.firebaseapp.com",
    databaseURL:       "https://dconnect4-b6d31-default-rtdb.firebaseio.com",
    projectId:         "dconnect4-b6d31",
    storageBucket:     "dconnect4-b6d31.firebasestorage.app",
    messagingSenderId: "184984622657",
    appId:             "1:184984622657:web:5e462797533e01fd37d8c0",
    measurementId:     "G-QWDW21S5S7"
  };
  // ───────────────────────────────────────────────────────────────────────────

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const boardRef = db.ref('board');

  let boardData = {};
  let selectedCell = null;

  // ── Helpers ─────────────────────────────────────────────────────────────────
  function cellSize() {
    return parseInt(getComputedStyle(document.documentElement).getPropertyValue('--cell')) || 56;
  }

  function layerPx() {
    const c = cellSize();
    const gap = 4;
    const pad = 6;
    return 5 * c + 4 * gap + 2 * pad; // grid width/height in px
  }

  // ── Build desktop board (diagonal, no overlap) ───────────────────────────────
  function buildDesktop() {
    const el = document.getElementById('board-desktop');
    el.innerHTML = '';

    const ls = layerPx();
    // Diagonal step: move enough so grids don't overlap at all
    // step must be >= ls to guarantee no overlap; use ls + small margin
    const step = ls + 16;
    // But that makes it very wide; use a diagonal so total width is reasonable.
    // We go right by (ls*0.55) and down by (ls*0.45) per step, but ensure
    // the horizontal step is at least ls so grids don't overlap horizontally.
    // Since ls*0.55 < ls, grids CAN overlap. Instead use a true staircase:
    // each layer is offset by exactly its own size (no overlap possible).
    const sx = Math.round(ls * 0.52);  // horizontal step per layer
    const sy = Math.round(ls * 0.42);  // vertical step per layer

    // With 5 layers the grids overlap if sx < ls. We need sx >= ls to have
    // zero overlap. But that spreads them far. The original design WANTS a
    // staircase that looks connected (each layer shares an edge with the next).
    // To avoid overlap while keeping staircase: sx = ls exactly.
    // Let's use sx = ls (no horizontal overlap) and sy = ls (no vertical overlap)
    // but that gives a very spread diagonal. Better: stagger by ~half so they
    // sit adjacent (touching but not overlapping).
    // Touching means sx = ls for horizontal, but we want diagonal adjacency.
    // We'll use sx = ls and sy = small to get a nice staircase feel.

    // Actually cleanest: lay them in a true diagonal where each grid starts
    // exactly where the previous one ends (corner-to-corner).
    // That means sx = ls, sy = ls — they share a corner point.
    // This matches the original image closely.
    const SX = ls + 8;  // slight gap between grids
    const SY = Math.round(ls * 0.3); // vertical offset creates staircase feel

    const totalW = ls + SX * 4;
    const totalH = ls + SY * 4;
    el.style.width  = totalW + 'px';
    el.style.height = totalH + 'px';

    for (let l = 0; l < 5; l++) {
      const wrap = document.createElement('div');
      wrap.style.position = 'absolute';
      wrap.style.left = (SX * l) + 'px';
      wrap.style.top  = (SY * l) + 'px';

      const label = document.createElement('div');
      label.className = 'layer-label';
      label.style.position = 'absolute';
      label.style.top = '-20px';
      label.style.left = '0';
      label.textContent = `Layer ${l + 1}`;
      wrap.appendChild(label);

      const grid = buildGrid(l);
      grid.style.width  = ls + 'px';
      grid.style.height = ls + 'px';
      wrap.appendChild(grid);
      el.appendChild(wrap);
    }
  }

  // ── Build mobile board (vertical stack) ──────────────────────────────────────
  function buildMobile() {
    const el = document.getElementById('board-mobile');
    el.innerHTML = '';

    for (let l = 0; l < 5; l++) {
      const wrap = document.createElement('div');
      wrap.className = 'mobile-layer-wrap';

      const label = document.createElement('div');
      label.className = 'layer-label';
      label.textContent = `Layer ${l + 1}`;
      wrap.appendChild(label);

      wrap.appendChild(buildGrid(l));
      el.appendChild(wrap);
    }
  }

  function buildGrid(l) {
    const grid = document.createElement('div');
    grid.className = 'layer';
    grid.id = `layer-grid-${l}`;

    for (let r = 0; r < 5; r++) {
      for (let c = 0; c < 5; c++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.id = `cell-${l}-${r}-${c}`;
        cell.setAttribute('tabindex', '0');
        cell.setAttribute('aria-label', `Layer ${l+1} row ${r+1} col ${c+1}`);
        cell.addEventListener('click', () => selectCell(l, r, c));
        grid.appendChild(cell);
      }
    }
    return grid;
  }

  function buildAll() {
    buildDesktop();
    buildMobile();
    renderBoard();
  }

  // ── Cell selection ───────────────────────────────────────────────────────────
  function selectCell(l, r, c) {
    if (selectedCell) {
      const prev = document.getElementById(`cell-${selectedCell.layer}-${selectedCell.row}-${selectedCell.col}`);
      if (prev) prev.classList.remove('editing');
      // also deselect the mirrored cell in the other board
      const prev2 = document.getElementById(`cell-${selectedCell.layer}-${selectedCell.row}-${selectedCell.col}`);
      if (prev2) prev2.classList.remove('editing');
    }
    selectedCell = { layer: l, row: r, col: c };
    document.querySelectorAll(`#cell-${l}-${r}-${c}`).forEach(el => el.classList.add('editing'));
    document.getElementById('capture').focus();
  }

  function deselectAll() {
    if (selectedCell) {
      const { layer, row, col } = selectedCell;
      document.querySelectorAll(`#cell-${layer}-${row}-${col}`).forEach(el => el.classList.remove('editing'));
    }
    selectedCell = null;
  }

  // ── Key capture ──────────────────────────────────────────────────────────────
  document.getElementById('capture').addEventListener('keydown', e => {
    if (!selectedCell) return;
    const { layer, row, col } = selectedCell;

    if (/^[a-zA-Z]$/.test(e.key)) {
      e.preventDefault();
      boardRef.child(`${layer}-${row}-${col}`).set(e.key.toUpperCase());
      advanceSelection(layer, row, col);
    } else if (e.key === 'Backspace' || e.key === 'Delete') {
      e.preventDefault();
      boardRef.child(`${layer}-${row}-${col}`).remove();
    } else if (e.key === 'Escape') {
      deselectAll();
    } else if (e.key === 'Tab') {
      e.preventDefault();
      advanceSelection(layer, row, col);
    }
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('.cell')) deselectAll();
  });

  function advanceSelection(l, r, c) {
    let nc = c + 1, nr = r;
    if (nc >= 5) { nc = 0; nr++; }
    if (nr >= 5) { nr = 0; }
    selectCell(l, nr, nc);
  }

  // ── Firebase ─────────────────────────────────────────────────────────────────
  boardRef.on('value', snap => {
    boardData = snap.val() || {};
    renderBoard();
  });

  db.ref('.info/connected').on('value', snap => {
    const online = snap.val() === true;
    document.getElementById('status-dot').classList.toggle('offline', !online);
    document.getElementById('status-text').textContent = online ? 'Live sync' : 'Offline';
  });

  function renderBoard() {
    for (let l = 0; l < 5; l++) {
      for (let r = 0; r < 5; r++) {
        for (let c = 0; c < 5; c++) {
          const letter = boardData[`${l}-${r}-${c}`] || '';
          // Update ALL instances (desktop + mobile share same IDs — querySelectorAll)
          document.querySelectorAll(`#cell-${l}-${r}-${c}`).forEach(el => {
            el.textContent = letter;
            el.classList.toggle('has-letter', !!letter);
            if (selectedCell && selectedCell.layer === l && selectedCell.row === r && selectedCell.col === c) {
              el.classList.add('editing');
            }
          });
        }
      }
    }
  }

  // ── Clear ────────────────────────────────────────────────────────────────────
  function confirmClear() {
    document.getElementById('modal-overlay').classList.add('active');
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('active');
  }

  function clearBoard() {
    closeModal();
    deselectAll();
    boardRef.remove().then(() => showToast('Board cleared'));
  }

  document.getElementById('modal-overlay').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
  });

  // ── Toast ────────────────────────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
  }

  // ── Init ─────────────────────────────────────────────────────────────────────
  buildAll();

  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => { buildAll(); }, 150);
  });
</script>

</body>
</html>
