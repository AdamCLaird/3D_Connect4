<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Connect Four</title>

  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cell: 56px;
      --gap: 4px;
      --pad: 6px;
      --board-bg: #1a1a2e;
      --cell-bg: #0f3460;
      --cell-hover: #1a4a7a;
      --cell-border: #2d5986;
      --text-primary: #eaeaea;
      --text-muted: #8892a4;
      --accent: #e94560;
      --header-bg: #12122a;
      --btn-clear: #e94560;
      --btn-clear-hover: #c73652;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--board-bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Header ── */
    header {
      width: 100%;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      background: var(--header-bg);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    header h1 {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: 0.03em;
    }

    header h1 span { color: var(--accent); }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-muted);
      background: rgba(255,255,255,0.05);
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #2ecc71;
      flex-shrink: 0;
    }

    .status-dot.offline { background: #e74c3c; }

    .btn-clear {
      background: var(--btn-clear);
      color: #fff;
      border: none;
      border-radius: 7px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
    }

    .btn-clear:hover { background: var(--btn-clear-hover); }
    .btn-clear:active { transform: scale(0.97); }

    /* ── Main ── */
    .main {
      width: 100%;
      padding: 40px 24px 60px;
      display: flex;
      justify-content: center;
      overflow-x: auto;
    }

    /* ── Desktop: diagonal staircase, NO overlap ── */
    /* Each grid is positioned so its left edge starts exactly where
       the previous grid's right edge ends, and steps down a bit.     */
    #board-desktop {
      position: relative;
      /* sized by JS */
    }

    /* ── Mobile: vertical stack ── */
    #board-mobile {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      width: 100%;
    }

    @media (max-width: 680px) {
      :root { --cell: 52px; }
      #board-desktop { display: none !important; }
      #board-mobile  { display: flex !important; }
      .main { padding: 28px 16px 60px; }
    }

    /* ── Layer grid ── */
    .layer {
      display: grid;
      grid-template-columns: repeat(5, var(--cell));
      grid-template-rows: repeat(5, var(--cell));
      gap: var(--gap);
      background: rgba(45, 89, 134, 0.18);
      border: 1px solid var(--cell-border);
      border-radius: 6px;
      padding: var(--pad);
    }

    .mobile-layer-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .layer-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
    }

    /* ── Cell ── */
    .cell {
      width: var(--cell);
      height: var(--cell);
      background: var(--cell-bg);
      border: 1px solid var(--cell-border);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
      transition: background 0.12s, border-color 0.12s, transform 0.1s;
      user-select: none;
      outline: none;
    }

    .cell:hover {
      background: var(--cell-hover);
      border-color: var(--accent);
      transform: scale(1.06);
      z-index: 10;
      position: relative;
    }

    .cell.has-letter {
      border-color: var(--accent);
    }

    .cell.editing {
      background: rgba(233, 69, 96, 0.2);
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent);
      position: relative;
      z-index: 10;
    }

    /* ── Keystroke capture input ── */
    /* Must be visible to the browser so mobile keyboards trigger,
       but visually invisible and out of the way.
       We use opacity:0 + a real on-screen position (not off-screen)
       so iOS/Android treat it as focusable and show the keyboard.   */
    #capture {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 1px;
      opacity: 0;
      border: none;
      padding: 0;
      font-size: 16px; /* prevents iOS auto-zoom on focus */
      background: transparent;
      color: transparent;
      caret-color: transparent;
      z-index: 1;
      pointer-events: none;
    }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.active { display: flex; }

    .modal {
      background: #1e1e38;
      border: 1px solid var(--cell-border);
      border-radius: 12px;
      padding: 28px 28px;
      width: 300px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .modal h3 { font-size: 17px; font-weight: 600; }
    .modal p  { font-size: 14px; color: var(--text-muted); line-height: 1.5; }
    .modal-btns { display: flex; gap: 10px; justify-content: flex-end; }

    .btn-secondary {
      background: rgba(255,255,255,0.07);
      color: var(--text-primary);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 7px;
      padding: 9px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.12); }

    .btn-modal-danger {
      background: var(--btn-clear);
      color: #fff;
      border: none;
      border-radius: 7px;
      padding: 9px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-modal-danger:hover { background: var(--btn-clear-hover); }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: #2d2d4e;
      color: var(--text-primary);
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      border: 1px solid rgba(255,255,255,0.1);
      transition: transform 0.25s ease;
      z-index: 200;
      pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<header>
  <h1>3D Connect <span>Four</span></h1>
  <div class="header-right">
    <div class="status-pill">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">Connecting…</span>
    </div>
    <button class="btn-clear" onclick="confirmClear()">✕ Clear board</button>
  </div>
</header>

<div class="main">
  <!-- Desktop: diagonal staircase -->
  <div id="board-desktop"></div>

  <!-- Mobile: vertical stack -->
  <div id="board-mobile"></div>
</div>

<!-- Confirm modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3>Clear the board?</h3>
    <p>This will erase all letters for everyone. This cannot be undone.</p>
    <div class="modal-btns">
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-modal-danger" onclick="clearBoard()">Clear board</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<input id="capture" type="text" autocomplete="off" />

<script>
  const firebaseConfig = {
    apiKey:            "AIzaSyBOrtrifGrTsc34UZ-QC1ilZ2H_pC7z6tw",
    authDomain:        "dconnect4-b6d31.firebaseapp.com",
    databaseURL:       "https://dconnect4-b6d31-default-rtdb.firebaseio.com",
    projectId:         "dconnect4-b6d31",
    storageBucket:     "dconnect4-b6d31.firebasestorage.app",
    messagingSenderId: "184984622657",
    appId:             "1:184984622657:web:5e462797533e01fd37d8c0",
    measurementId:     "G-QWDW21S5S7"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const boardRef = db.ref('board');

  let boardData = {};
  let selectedCell = null;

  /* ── Layout helpers ─────────────────────────────────────────────── */
  function cellPx() {
    return parseInt(getComputedStyle(document.documentElement).getPropertyValue('--cell')) || 56;
  }

  function layerPx() {
    const c = cellPx();
    return 5 * c + 4 * 4 + 2 * 6; // 5 cells + 4 gaps + 2*padding
  }

  /* ── Build desktop board ────────────────────────────────────────── */
  /* Strategy: place each grid so it sits BELOW-RIGHT of the previous
     one with a small gap — no horizontal overlap at all.
     We step right by (layerSize + gapBetween) and down by a smaller
     amount to get the staircase look from the original image.        */
  function buildDesktop() {
    const wrap = document.getElementById('board-desktop');
    wrap.innerHTML = '';

    const ls   = layerPx();
    const gapH = 12;   // horizontal gap between grids
    const stepX = ls + gapH;
    const stepY = Math.round(ls * 0.28); // vertical drop per layer

    const totalW = ls + stepX * 4;
    const totalH = ls + stepY * 4 + 24; // +24 for labels
    wrap.style.width  = totalW + 'px';
    wrap.style.height = totalH + 'px';

    for (let l = 0; l < 5; l++) {
      const layerWrap = document.createElement('div');
      layerWrap.style.cssText = `position:absolute; left:${stepX * l}px; top:${stepY * l + 20}px;`;

      const label = document.createElement('div');
      label.className = 'layer-label';
      label.style.cssText = 'position:absolute; top:-18px; left:0;';
      label.textContent = `Layer ${l + 1}`;
      layerWrap.appendChild(label);

      layerWrap.appendChild(buildGrid(l));
      wrap.appendChild(layerWrap);
    }
  }

  /* ── Build mobile board ─────────────────────────────────────────── */
  function buildMobile() {
    const wrap = document.getElementById('board-mobile');
    wrap.innerHTML = '';

    for (let l = 0; l < 5; l++) {
      const layerWrap = document.createElement('div');
      layerWrap.className = 'mobile-layer-wrap';

      const label = document.createElement('div');
      label.className = 'layer-label';
      label.textContent = `Layer ${l + 1}`;
      layerWrap.appendChild(label);

      layerWrap.appendChild(buildGrid(l));
      wrap.appendChild(layerWrap);
    }
  }

  /* ── Build a single 5×5 grid ────────────────────────────────────── */
  function buildGrid(l) {
    const grid = document.createElement('div');
    grid.className = 'layer';

    for (let r = 0; r < 5; r++) {
      for (let c = 0; c < 5; c++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.dataset.l = l;
        cell.dataset.r = r;
        cell.dataset.c = c;
        cell.setAttribute('tabindex', '0');
        cell.setAttribute('aria-label', `Layer ${l+1} row ${r+1} col ${c+1}`);
        cell.addEventListener('click', () => selectCell(l, r, c));
        grid.appendChild(cell);
      }
    }
    return grid;
  }

  function buildAll() {
    buildDesktop();
    buildMobile();
    renderBoard();
  }

  /* ── Selection ──────────────────────────────────────────────────── */
  function selectCell(l, r, c) {
    if (selectedCell) clearEditing(selectedCell);
    selectedCell = { layer: l, row: r, col: c };
    getCells(l, r, c).forEach(el => el.classList.add('editing'));

    // Focus the capture input so mobile keyboards appear.
    // Briefly allow pointer-events so iOS/Android treat it as interactive.
    const cap = document.getElementById('capture');
    cap.style.pointerEvents = 'auto';
    cap.value = '';
    cap.focus();
    setTimeout(() => { cap.style.pointerEvents = 'none'; }, 100);
  }

  function deselectAll() {
    if (selectedCell) clearEditing(selectedCell);
    selectedCell = null;
  }

  function clearEditing({ layer, row, col }) {
    getCells(layer, row, col).forEach(el => el.classList.remove('editing'));
  }

  function getCells(l, r, c) {
    return document.querySelectorAll(`.cell[data-l="${l}"][data-r="${r}"][data-c="${c}"]`);
  }

  /* ── Key capture (desktop + mobile) ────────────────────────────── */
  const capture = document.getElementById('capture');

  // Desktop: keydown fires with e.key
  capture.addEventListener('keydown', e => {
    if (!selectedCell) return;
    const { layer, row, col } = selectedCell;
    if (/^[a-zA-Z]$/.test(e.key)) {
      e.preventDefault();
      boardRef.child(`${layer}-${row}-${col}`).set(e.key.toUpperCase());
      advanceSelection(layer, row, col);
    } else if (e.key === 'Backspace' || e.key === 'Delete') {
      e.preventDefault();
      boardRef.child(`${layer}-${row}-${col}`).remove();
    } else if (e.key === 'Escape') {
      deselectAll();
    } else if (e.key === 'Tab') {
      e.preventDefault();
      advanceSelection(layer, row, col);
    }
  });

  // Mobile: virtual keyboards fire 'input' rather than 'keydown'.
  // Read the typed character then immediately clear the input so it
  // stays ready for the next tap.
  capture.addEventListener('input', () => {
    if (!selectedCell) return;
    const val = capture.value;
    capture.value = '';
    if (!val) return;
    const { layer, row, col } = selectedCell;
    const char = val.slice(-1); // last char (handles autocorrect)
    if (/^[a-zA-Z]$/.test(char)) {
      boardRef.child(`${layer}-${row}-${col}`).set(char.toUpperCase());
      advanceSelection(layer, row, col);
    }
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('.cell')) deselectAll();
  });

  function advanceSelection(l, r, c) {
    let nc = c + 1, nr = r;
    if (nc >= 5) { nc = 0; nr++; }
    if (nr >= 5) { nr = 0; }
    selectCell(l, nr, nc);
  }

  /* ── Firebase sync ──────────────────────────────────────────────── */
  boardRef.on('value', snap => {
    boardData = snap.val() || {};
    renderBoard();
  });

  db.ref('.info/connected').on('value', snap => {
    const online = snap.val() === true;
    document.getElementById('status-dot').classList.toggle('offline', !online);
    document.getElementById('status-text').textContent = online ? 'Live sync' : 'Offline';
  });

  function renderBoard() {
    for (let l = 0; l < 5; l++) {
      for (let r = 0; r < 5; r++) {
        for (let c = 0; c < 5; c++) {
          const letter = boardData[`${l}-${r}-${c}`] || '';
          getCells(l, r, c).forEach(el => {
            el.textContent = letter;
            el.classList.toggle('has-letter', !!letter);
            if (selectedCell && selectedCell.layer === l && selectedCell.row === r && selectedCell.col === c) {
              el.classList.add('editing');
            }
          });
        }
      }
    }
  }

  /* ── Clear ──────────────────────────────────────────────────────── */
  function confirmClear() {
    document.getElementById('modal-overlay').classList.add('active');
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('active');
  }

  function clearBoard() {
    closeModal();
    deselectAll();
    boardRef.remove().then(() => showToast('Board cleared'));
  }

  document.getElementById('modal-overlay').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
  });

  /* ── Toast ──────────────────────────────────────────────────────── */
  let toastTimer;
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
  }

  /* ── Init ───────────────────────────────────────────────────────── */
  buildAll();

  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(buildAll, 150);
  });
</script>

</body>
</html>
